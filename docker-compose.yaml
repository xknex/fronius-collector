services:
  collector:
    env_file:
      - .env
    image: fronius-collector
    container_name: fronius-collector
    volumes:
      - ./logs:/app/logs
    # Healthcheck ensures container is alive and responding
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f collector_docker.py >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      - influxdb2

  dashboard:
    image: fronius-collector
    container_name: fronius-dashboard
    ports:
      - "8080:8080"
    environment:
      INFLUX_URL: "http://influxdb2:8086"
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      DASHBOARD_PORT: "8080"
    command: python /app/dashboard/app.py
    depends_on:
      - influxdb2
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  influxdb2:
    image: influxdb:2
    container_name: fronius-influxdb
    ports:
      - 8086:8086
    environment:
      INFLUXDB_DB: ${INFLUX_BUCKET}
      INFLUXDB_ADMIN_USER: ${INFLUX_ORG}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUX_TOKEN}
    volumes:
      - type: volume
        source: influxdb2-data
        target: /var/lib/influxdb2
      - type: volume
        source: influxdb2-config
        target: /etc/influxdb2
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  influxdb2-data:
  influxdb2-config: